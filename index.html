<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">

      <symbol id="icon-football" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m12 7 4 3-2 5h-4l-2-5ZM12 7V3M16 10l4-1M14 15l2 5M10 15l-2 5M8 10 4 9"/></symbol>

        <path d="M3.5 4.5h15L11 13Z" fill="#f45d91"/>
        <path d="M6.2 7h9.6" stroke="#ffe45c"/>
        <path d="M11 13v6.5M7.5 21h7"/>

  </svg>
  <div class="stage-landscape" aria-hidden="true">
    <span class="landscape-sun"></span>
    <span class="landscape-back"></span>
    <span class="landscape-front"></span>
    <span class="landscape-detail"></span>
  </div>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" data-view="home" aria-label="Zur Startseite">
        <span class="brand-mark">VR</span>
        <span class="brand-copy"><strong>Vamos Roadtrip</strong><small>Sol · Sprache · Fun</small></span>
      </button>
      <div class="stats" aria-label="Dein Lernstand">
        <span class="stat stat-streak" title="Lernserie"><svg class="ui-icon" aria-hidden="true"><use href="#icon-flame"></use></svg><b id="streakValue">1</b></span>
        <span class="stat stat-xp" title="Erfahrungspunkte"><svg class="ui-icon" aria-hidden="true"><use href="#icon-bolt"></use></svg><b id="xpValue">0</b></span>
        <span class="stat stat-hearts" title="Herzen"><svg class="ui-icon" aria-hidden="true"><use href="#icon-heart"></use></svg><b id="heartsValue">5</b></span>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button class="nav-item active" data-view="home"><svg class="ui-icon" aria-hidden="true"><use href="#icon-bus"></use></svg><small>Roadtrip</small></button>
      <button class="nav-item" data-view="learn"><svg class="ui-icon" aria-hidden="true"><use href="#icon-chat"></use></svg><small>Themen</small></button>
      <button class="nav-item" data-view="practice"><svg class="ui-icon" aria-hidden="true"><use href="#icon-target"></use></svg><small>Üben</small></button>
      <button class="nav-item" data-view="grammar"><svg class="ui-icon" aria-hidden="true"><use href="#icon-puzzle"></use></svg><small>Grammatik</small></button>
      <button class="nav-item" data-view="profile"><svg class="ui-icon" aria-hidden="true"><use href="#icon-trophy"></use></svg><small>Profil</small></button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
